<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#333333"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#15290e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Avocado emoji -->
  <text x="600" y="230" font-size="100" text-anchor="middle" dominant-baseline="middle">🥑</text>

  <!-- palta title -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">palta</text>

  <!-- Tagline -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#6ab344" text-anchor="middle" letter-spacing="0.5">Formatação e validação de dados da América Latina</text>

  <!-- Country flags -->
  <text x="390" y="490" font-size="44" text-anchor="middle">🇧🇷</text>
  <text x="465" y="490" font-size="44" text-anchor="middle">🇨🇱</text>
  <text x="540" y="490" font-size="44" text-anchor="middle">🇦🇷</text>
  <text x="615" y="490" font-size="44" text-anchor="middle">🇨🇴</text>
  <text x="690" y="490" font-size="44" text-anchor="middle">🇵🇪</text>

  <!-- Subtitle line -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#525252" text-anchor="middle">CPF · RUT · CUIT · NIT · RUC · Currency · Phone · Zipcode</text>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#6ab344"/>
</svg>
