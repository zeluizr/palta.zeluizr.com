name: Close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close-external-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check if author is a collaborator
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.pull_request.user.login,
            }).catch(() => ({ data: { permission: 'none' } }));

            const isCollaborator = ['admin', 'write', 'maintain'].includes(data.permission);
            core.setOutput('is_collaborator', isCollaborator ? 'true' : 'false');

      - name: Close PR if not a collaborator
        if: steps.check.outputs.is_collaborator == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '👋 Thank you for your interest in this project!',
                '',
                'This repository is open for viewing, forking, and starring, but **pull requests from external contributors are not accepted**. Only project collaborators can submit PRs.',
                '',
                'Feel free to fork the repo and use it in your own projects.',
                '',
                '---',
                '',
                '👋 Obrigado pelo interesse neste projeto!',
                '',
                'Este repositório está aberto para visualização, fork e estrela, mas **pull requests de contribuidores externos não são aceitas**. Somente colaboradores do projeto podem enviar PRs.',
                '',
                'Fique à vontade para fazer um fork e usar o projeto nos seus próprios projetos.',
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
